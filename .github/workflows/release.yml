on:
  workflow_dispatch:

name: Release

jobs:
  bun:
    name: bun validation
    runs-on: ubuntu-latest

    steps:
      # Setup environment
      - uses: actions/checkout@v6

      # Validate branch
      - name: Validate if in master branch
        run: '[ "$GITHUB_REF_NAME" == "master" ] || { echo "Not in master: $GITHUB_REF_NAME"; exit 1; }'

      - name: Use Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Install dependencies
      - name: Install dependencies
        run: bun install

      # Build
      - name: Prepare
        run: bun run generate-prisma
      - name: Bun build
        run: bun run validate

      # Light tests (docker tests not supported yet)
      - name: Bun light tests
        run: bun run no-docker-examples

      # New test suite — full matrix mocked + real WASM phase (no docker).
      - name: Bun new test suite
        run: bun run test:no-docker

  build:
    needs: bun
    name: build library
    runs-on: ubuntu-latest
    environment: npm-release
    
    steps:
      # Setup environment
      - uses: actions/checkout@v6
      - name: Use Node.js 26.x
        uses: actions/setup-node@v6
        with:
          node-version: '26.x'
          registry-url: 'https://registry.npmjs.org'

      # Validate branch
      - name: Validate if in master branch
        run: '[ "$GITHUB_REF_NAME" == "master" ] || { echo "Not in master: $GITHUB_REF_NAME"; exit 1; }'

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Build
      - name: Prepare
        run: npm run generate-prisma
      - name: Build
        run: npm run build

      # Light tests (docker tests not supported yet)
      - name: Light tests
        run: npm run no-docker-examples

      # New test suite — full matrix mocked + real WASM phase (no docker).
      - name: New test suite
        run: npm run test:no-docker

      # Publish
      - name: Build for dist & Publish
        run: npm run dist
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
