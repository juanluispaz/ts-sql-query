on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

name: CI

jobs:
  build:
    name: build library
    runs-on: ubuntu-latest
    strategy:
        matrix:
            node-version: [22.x, 24.x, 26.x]
    steps:
      # Setup environment
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Build
      - name: Prepare
        run: npm run generate-prisma
      - name: Build
        run: npm run build

      # Light tests (docker tests not supported yet)
      - name: Light tests
        run: npm run no-docker-examples

  bun:
    name: bun examples
    runs-on: ubuntu-latest
    steps:
      # Setup environment
      - uses: actions/checkout@v6
      - name: Use Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Install dependencies
      - name: Install dependencies
        run: bun install

      # Prepare generated clients used by examples
      - name: Prepare
        run: bun run generate-prisma

      # Build check without emitting dist
      - name: Bun build
        run: bun run validate

      # Light tests (docker tests not supported yet)
      - name: Bun light tests
        run: bun run bun:no-docker-examples
