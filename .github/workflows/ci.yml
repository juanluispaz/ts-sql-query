on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

name: CI

jobs:
  build:
    name: node validation
    runs-on: ubuntu-latest
    strategy:
        matrix:
            node-version: [22.x, 24.x, 26.x]
    steps:
      # Setup environment
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Build
      - name: Prepare
        run: npm run codegen
      - name: Build
        run: npm run build

      # Type-check src with tsgo (preview TS 7 compiler) in addition to
      # the tsc check already covered by `npm run build` above.
      - name: Validate src (tsgo)
        run: npm run validate:tsgo

      # Type-check the test/ tree against the published library types.
      # tsgo is authoritative for the test matrix; tsc runs as the
      # sub-experience right after, covering the few files excluded
      # from the tsgo config (see test/MAINTAINING.md).
      - name: Validate tests (tsgo, authoritative)
        run: npm run validate:tests
      - name: Validate tests (tsc, sub-experience)
        run: npm run validate:tests:tsc
        env:
          # Raise V8's heap ceiling: tsc checks the full test/ matrix + src/
          # in one program (~4.5 GB peak) and OOMs at Node's ~4 GB default.
          NODE_OPTIONS: --max-old-space-size=8192

      # Symmetry audit (DESIGN §4) — structural check of test/db/.
      - name: Audit test symmetry
        run: npm run tests:audit

      # Light tests (docker tests not supported yet)
      - name: Light tests
        run: npm run no-docker-examples

      # New test suite — full matrix mocked + real WASM phase (no docker).
      - name: New test suite
        run: npm run test:no-docker

  bun:
    name: bun validation
    runs-on: ubuntu-latest
    steps:
      # Setup environment
      - uses: actions/checkout@v6
      - name: Use Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Install dependencies
      - name: Install dependencies
        run: bun install

      # Prepare generated clients used by examples
      - name: Prepare
        run: bun run codegen

      # Build check without emitting dist (tsc).
      - name: Bun build (tsc)
        run: bun run validate
      # Same src check with tsgo (preview TS 7 compiler).
      - name: Bun build (tsgo)
        run: bun run validate:tsgo

      # Type-check the test/ tree against the published library types.
      # tsgo is authoritative for the test matrix; tsc runs as the
      # sub-experience right after, covering the few files excluded
      # from the tsgo config (see test/MAINTAINING.md).
      - name: Bun validate tests (tsgo, authoritative)
        run: bun run validate:tests
      - name: Bun validate tests (tsc, sub-experience)
        run: bun run validate:tests:tsc
        env:
          # Raise V8's heap ceiling: tsc checks the full test/ matrix + src/
          # in one program (~4.5 GB peak) and OOMs at Node's ~4 GB default.
          NODE_OPTIONS: --max-old-space-size=8192

      # Symmetry audit (DESIGN §4) — structural check of test/db/.
      - name: Bun audit test symmetry
        run: bun run tests:audit

      # Light tests (docker tests not supported yet)
      - name: Bun light tests
        run: bun run no-docker-examples

      # New test suite — full matrix mocked + real WASM phase (no docker).
      - name: Bun new test suite
        run: bun run test:no-docker
