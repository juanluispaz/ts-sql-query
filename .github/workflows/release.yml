on:
  workflow_dispatch:

name: Release

jobs:
  bun:
    name: bun validation
    runs-on: ubuntu-latest

    steps:
      # Setup environment
      - uses: actions/checkout@v6

      # Validate branch
      - name: Validate if in master branch
        run: '[ "$GITHUB_REF_NAME" == "master" ] || { echo "Not in master: $GITHUB_REF_NAME"; exit 1; }'

      - name: Use Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Install dependencies
      - name: Install dependencies
        run: bun install

      # Build
      - name: Prepare
        run: bun run codegen
      - name: Bun build (tsc)
        run: bun run validate
      # Same src check with tsgo (preview TS 7 compiler).
      - name: Bun build (tsgo)
        run: bun run validate:tsgo

      # Type-check the test/ tree against the published library types.
      # tsgo is authoritative for the test matrix; tsc runs as the
      # sub-experience right after, covering the few files excluded
      # from the tsc config (see test/MAINTAINING.md).
      - name: Bun validate tests (tsgo, authoritative)
        run: bun run validate:tests
      - name: Bun validate tests (tsc, sub-experience)
        run: bun run validate:tests:tsc
        env:
          # Raise V8's heap ceiling: tsc checks the full test/ matrix + src/
          # in one program (~4.5 GB peak) and OOMs at Node's ~4 GB default.
          NODE_OPTIONS: --max-old-space-size=8192

      # Symmetry audit (DESIGN §4) — structural check of test/db/.
      - name: Bun audit test symmetry
        run: bun run tests:audit

      # Light tests (docker tests not supported yet)
      - name: Bun light tests
        run: bun run no-docker-examples

      # New test suite — full matrix mocked + real WASM phase (no docker).
      - name: Bun new test suite
        run: bun run test:no-docker

  build:
    needs: bun
    name: build library
    runs-on: ubuntu-latest
    environment: npm-release
    
    steps:
      # Setup environment
      - uses: actions/checkout@v6
      - name: Use Node.js 26.x
        uses: actions/setup-node@v6
        with:
          node-version: '26.x'
          registry-url: 'https://registry.npmjs.org'

      # Validate branch
      - name: Validate if in master branch
        run: '[ "$GITHUB_REF_NAME" == "master" ] || { echo "Not in master: $GITHUB_REF_NAME"; exit 1; }'

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Build
      - name: Prepare
        run: npm run codegen
      - name: Build
        run: npm run build
      # Type-check src with tsgo (preview TS 7 compiler) in addition to
      # the tsc check already covered by `npm run build` above.
      - name: Validate src (tsgo)
        run: npm run validate:tsgo

      # Tests (new matrix + legacy examples) and the test-tree typecheck run
      # ONLY on the bun job above: Bun runs the full suite in ~4 min vs ~25 min
      # on Node, and `needs: bun` already gates this job on a green Bun run, so
      # the Node side only builds the publishable artifact and publishes it.

      # Publish
      - name: Build for dist & Publish
        run: npm run dist
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
