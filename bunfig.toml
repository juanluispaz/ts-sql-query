# Defaults for bun:test coverage. Mirrored as the array
# COVERAGE_DEFAULT_EXCLUDE in scripts/_test-common.sh so the
# `--coverage-exclude` CLI flag can extend (rather than replace) these
# when it generates a temp bunfig.toml.
#
# The list scopes coverage to the public library surface:
#   * src/examples/**  — legacy executable examples; not the test/
#     suite's target.
#   * test/**          — test infrastructure and the test files
#                        themselves.
[test]
# Force UTC before any test module loads (see test/lib/setupTimezone.ts).
preload = ["./test/lib/setupTimezone.ts"]
coveragePathIgnorePatterns = ["src/examples/**", "test/**", "src/queryRunners/*", "src/queryRunners/connectorErrorMappers/*", "src/queryRunners/databaseErrorMappers/*"]
